<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVibe Premium | PopCorn & Chill</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap');

        :root {
            --popcorn-yellow: #FFD700;
            --popcorn-red: #E50914;
            --bg-deep: #080808;
            --card-bg: #141414;
            --premium-shadow: 0 10px 30px rgba(0,0,0,0.8);
            --transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; background-color: var(--bg-deep); color: white;
            font-family: 'Montserrat', sans-serif; overflow-x: hidden;
        }

        /* --- 1. L'ENTRÉE SPECTACULAIRE (MASCOTTE POP-CORN) --- */
        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 100000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: curtainUp 1s forwards 3.5s;
        }

        .popcorn-bucket {
            width: 160px; height: 200px;
            background: repeating-linear-gradient(90deg, #fff, #fff 25px, var(--popcorn-red) 25px, var(--popcorn-red) 50px);
            border-radius: 5px 5px 30px 30px; position: relative;
            box-shadow: 0 0 40px rgba(229, 9, 20, 0.5);
        }

        .eye {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 90px; height: 50px; background: #fff; border-radius: 50%;
            border: 4px solid #000; overflow: hidden;
        }

        .pupil {
            width: 30px; height: 30px; background: #000; border-radius: 50%;
            position: absolute; top: 10px; left: 30px;
            box-shadow: inset 0 0 8px var(--popcorn-yellow);
            animation: eyeMove 3s infinite;
        }

        .jumping-popcorn {
            position: absolute; top: -50px; width: 100%; text-align: center;
            font-size: 40px; animation: bouncePop 0.5s infinite;
        }

        @keyframes bouncePop { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        @keyframes eyeMove { 0%, 100% { transform: translate(0,0); } 30% { transform: translate(-15px, 5px); } 70% { transform: translate(15px, -5px); } }
        @keyframes curtainUp { to { transform: translateY(-100%); visibility: hidden; } }

        /* --- 2. NAVIGATION STYLE STREAMING --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 5000;
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: 0.4s;
        }

        .logo { font-family: 'Bebas Neue', cursive; font-size: 45px; color: var(--popcorn-yellow); text-shadow: 3px 3px var(--popcorn-red); }
        
        .nav-links { display: flex; gap: 25px; }
        .nav-links span { 
            cursor: pointer; font-weight: 700; font-size: 0.9rem; text-transform: uppercase;
            transition: 0.3s; color: rgba(255,255,255,0.7);
        }
        .nav-links span:hover, .nav-links span.active { color: var(--popcorn-yellow); transform: scale(1.1); }

        /* --- 3. SECTION "À LA UNE" (KAIZEN) --- */
        .featured-hero {
            height: 90vh; position: relative; display: flex; align-items: center; padding: 0 5%;
            background: linear-gradient(to right, #000 20%, transparent 80%);
        }

        .video-bg {
            position: absolute; top: 0; right: 0; width: 70%; height: 100%; z-index: -1;
            overflow: hidden; border-bottom-left-radius: 100px;
        }
        .video-bg iframe { width: 100%; height: 100%; transform: scale(1.5); pointer-events: none; }

        .hero-info { max-width: 600px; }
        .hero-info h1 { font-family: 'Bebas Neue'; font-size: 5rem; margin: 0; line-height: 0.9; }
        .hero-info p { font-size: 1.1rem; color: #ccc; margin: 20px 0; }
        
        .btn-play {
            background: var(--popcorn-yellow); color: #000; border: none;
            padding: 15px 40px; font-weight: bold; border-radius: 5px; cursor: pointer;
            font-size: 1rem; transition: 0.3s;
        }
        .btn-play:hover { background: #fff; transform: scale(1.05); }

        /* --- 4. LES CATÉGORIES ET GRILLES --- */
        .content-wrap { padding: 40px 5%; margin-top: -100px; position: relative; z-index: 10; }

        .row-title { font-family: 'Bebas Neue'; font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 20px; }
        
        .video-row {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px; margin-bottom: 60px;
        }

        .movie-card {
            background: var(--card-bg); border-radius: 10px; overflow: hidden;
            transition: var(--transition); cursor: pointer; position: relative;
            box-shadow: var(--premium-shadow);
        }

        .movie-card:hover { transform: scale(1.08); z-index: 100; box-shadow: 0 0 30px var(--popcorn-yellow); }
        .movie-card img { width: 100%; height: 180px; object-fit: cover; }
        
        .card-details { padding: 15px; }
        .card-details h4 { margin: 0; font-size: 1.1rem; color: var(--popcorn-yellow); }
        .card-details span { font-size: 0.8rem; color: #888; }

        /* --- 5. LOADER DE CHARGEMENT --- */
        #action-loader {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 200000; justify-content: center; align-items: center;
        }
        .spinner { width: 60px; height: 60px; border: 5px solid #222; border-top: 5px solid var(--popcorn-yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="jumping-popcorn">🍿🍿🍿</div>
        <div class="popcorn-bucket">
            <div class="eye"><div class="pupil"></div></div>
        </div>
        <h1 style="color:var(--popcorn-yellow); font-family:'Bebas Neue'; font-size: 3rem; margin-top: 20px;">LANCEMENT STREAMVIBE...</h1>
    </div>

    <div id="action-loader"><div class="spinner"></div></div>

    <nav id="navbar">
        <div class="logo">POPCORN TV</div>
        <div class="nav-links">
            <span class="active" onclick="showCat('all')">Accueil</span>
            <span onclick="showCat('jeux-video')">Jeux Vidéo</span>
            <span onclick="showCat('horreur')">Horreur</span>
            <span onclick="showCat('zone-neutre')">Zone Neutre</span>
            <span onclick="showCat('science')">Science</span>
        </div>
        <button style="background:transparent; border:1px solid #fff; color:#fff; cursor:pointer; padding:5px 15px;" onclick="toggleDim()">🔆 LUMINOSITÉ</button>
    </nav>

    <section class="featured-hero">
        <div class="video-bg">
            <iframe src="https://www.youtube.com/embed/wrFsapf0Enk?autoplay=1&mute=1&controls=0&loop=1&playlist=wrFsapf0Enk" frameborder="0"></iframe>
        </div>
        <div class="hero-info">
            <div style="background:var(--popcorn-red); display:inline-block; padding:5px 15px; font-weight:bold; margin-bottom:10px;">EXCLUSIVITÉ</div>
            <h1>KAIZEN : L'EVEREST</h1>
            <p>1 an de préparation, une vie de rêve. Accompagnez Inoxtag dans le défi le plus fou de sa carrière de créateur.</p>
            <button class="btn-play" onclick="openVideo('Kaizen')">▶ REGARDER LE FILM</button>
        </div>
    </section>

    <main class="content-wrap">
        <div id="content-display">
            </div>
    </main>

    <script>
        // --- BASE DE DONNÉES COMPLÈTE ---
        const CATALOG = [
            { id: 'LpZ6S8-IUKw', title: 'Dr Nozman : Le futur', cat: 'science', author: 'Docteur Nozman' },
            { id: 'v5E4_6XfM-A', title: 'Thread Horreur : La Nuit', cat: 'horreur', author: 'Squeezie' },
            { id: '6VgKYd0JWq4', title: 'Trailer Kaizen', cat: 'zone-neutre', author: 'Inoxtag' },
            { id: 'p6v6lO2vE7E', title: 'Peur en VR', cat: 'horreur', author: 'Horror-TV' },
            { id: 'Xj_XvW5WfWk', title: 'Elden Ring - Boss final', cat: 'jeux-video', author: 'Pro-Gamer' },
            { id: 'LXb3EKWsInQ', title: 'Nature sauvage', cat: 'zone-neutre', author: 'Planet Earth' }
        ];

        // --- GESTION CACHE 24H ---
        function initSite() {
            const syncTime = localStorage.getItem('pop_sync');
            const now = new Date().getTime();

            if (!syncTime || (now - syncTime > 86400000)) {
                localStorage.setItem('pop_cache', JSON.stringify(CATALOG));
                localStorage.setItem('pop_sync', now);
            }
            showCat('all');
        }

        function showCat(filter) {
            const container = document.getElementById('content-display');
            const data = JSON.parse(localStorage.getItem('pop_cache'));
            
            // On définit les sections à afficher
            const categories = filter === 'all' ? ['jeux-video', 'horreur', 'zone-neutre', 'science'] : [filter];
            
            container.innerHTML = categories.map(catName => {
                const videos = data.filter(v => v.cat === catName);
                if (videos.length === 0) return '';
                
                return `
                    <h2 class="row-title">${catName.replace('-', ' ').toUpperCase()}</h2>
                    <div class="video-row">
                        ${videos.map(v => `
                            <div class="movie-card" onclick="openVideo('${v.title}')">
                                <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg">
                                <div class="card-details">
                                    <h4>${v.title}</h4>
                                    <span>${v.author}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }

        // --- FONCTIONS UI ---
        function openVideo(name) {
            const loader = document.getElementById('action-loader');
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.display = 'none';
                alert("Ouverture de la séance : " + name);
            }, 2000);
        }

        function toggleDim() {
            const b = document.body.style.filter;
            document.body.style.filter = b === 'brightness(0.4)' ? 'brightness(1)' : 'brightness(0.4)';
        }

        // Effet scroll navbar
        window.onscroll = () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 100) nav.style.background = "#000";
            else nav.style.background = "linear-gradient(to bottom, rgba(0,0,0,0.9), transparent)";
        }

        window.onload = initSite;
    </script>
</body>
</html>
