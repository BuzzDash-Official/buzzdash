<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POPCORN STREAM — ÉDITION ULTIME</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050608; --surface: #0f1219; --surface2: #161c26;
    --gold: #f5c842; --red: #e8392a; --text: #eaeaea;
    --muted: #7a8499; --border: rgba(255,255,255,0.06); --sidebar: 240px;
    --violet: rgba(139, 92, 246, 0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; }
  
  /* AMBIANCE VIOLETTE & GRAIN */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 50%, var(--violet) 0%, transparent 80%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  /* --- INTRO CINÉMA (RIDEAUX + ŒIL) --- */
  #intro {
    position: fixed; inset: 0; z-index: 9999; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: introFade 0.8s ease-in forwards 4.8s;
  }
  .curtain-l,.curtain-r { position:absolute; top:0; width:50%; height:100%; background:linear-gradient(to bottom,#1a0a00,#000); z-index:1; }
  .curtain-l { left:0; transform-origin:left; animation:cL 1.4s cubic-bezier(.77,0,.18,1) forwards .5s; }
  .curtain-r { right:0; transform-origin:right; animation:cR 1.4s cubic-bezier(.77,0,.18,1) forwards .5s; }
  .curtain-l::after { content:''; position:absolute; right:0; top:0; bottom:0; width:4px; background:var(--red); box-shadow:0 0 20px var(--red); }
  
  .intro-logo { position:relative; z-index:2; display:flex; align-items:center; gap:25px; opacity:0; animation:logoIn .8s forwards 2s; }
  .intro-pop { font-size:100px; position:relative; animation: swirl 1.5s ease-out; }
  .intro-eye { position:absolute; font-size:38px; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); animation:eyeIn .4s forwards 2.8s, eyeBlink .3s infinite 4s; }
  .intro-text .big { font-family:'Bebas Neue'; font-size:70px; color:var(--gold); filter: blur(10px); animation: blurClear 1s forwards 3.2s; }

  @keyframes cL { to { transform:scaleX(0); } } @keyframes cR { to { transform:scaleX(0); } }
  @keyframes swirl { from { transform: rotate(-180deg) scale(0); } to { transform: rotate(0) scale(1); } }
  @keyframes eyeIn { to { transform:translate(-50%,-50%) scale(1); } }
  @keyframes eyeBlink { 0%,85%,100% { transform:translate(-50%,-50%) scaleY(1); } 92% { transform:translate(-50%,-50%) scaleY(.1); } }
  @keyframes blurClear { to { filter: blur(0); } }
  @keyframes logoIn { to { opacity:1; } }
  @keyframes introFade { to { opacity:0; visibility:hidden; } }

  /* --- INTERFACE --- */
  #sidebar { position:fixed; left:0; top:0; bottom:0; width:var(--sidebar); background:var(--surface); border-right:1px solid var(--border); z-index:100; padding:25px; display:flex; flex-direction:column; }
  .nav-btn { background:none; border:none; color:var(--muted); width:100%; text-align:left; padding:12px; font-family:'DM Sans'; font-weight:700; cursor:pointer; border-radius:8px; transition:0.2s; margin-bottom:5px; }
  .nav-btn:hover, .nav-btn.active { background:rgba(245,200,66,0.1); color:var(--gold); }
  
  #main { position:fixed; left:var(--sidebar); right:0; top:0; bottom:0; overflow-y:auto; padding:100px 40px; }
  .vgrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:25px; }
  .vcard { background:var(--surface); border-radius:12px; overflow:hidden; border:1px solid var(--border); cursor:pointer; transition:0.3s; }
  .vcard:hover { transform:translateY(-8px); border-color:var(--gold); }
  .thumb-box { position:relative; aspect-ratio:16/9; }
  .vthumb { width:100%; height:100%; object-fit:cover; }
  
  /* MODAL */
  #modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:3000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
  #modal.open { display:flex; }
  .player-box { width:90%; max-width:1000px; aspect-ratio:16/9; background:#000; border-radius:15px; overflow:hidden; border:2px solid var(--gold); }
</style>
</head>
<body>

<div id="intro">
  <div class="curtain-l"></div><div class="curtain-r"></div>
  <div class="intro-logo">
    <div class="intro-pop">🍿<div class="intro-eye">👁️</div></div>
    <div class="intro-text"><span class="big">Popcorn Stream</span></div>
  </div>
</div>

<aside id="sidebar">
  <div style="color:var(--gold); font-family:'Bebas Neue'; font-size:24px; margin-bottom:40px;">🍿 POPCORN STREAM</div>
  <button class="nav-btn active" onclick="activateNav(this);displayManual()">🔥 À LA UNE</button>
  <button class="nav-btn" onclick="activateNav(this);loadRSS('UC_i8X3p8oZNaik8X513Zn1Q','Action','🎬')">🎬 ACTION</button>
  <button class="nav-btn" onclick="activateNav(this);loadRSS('UCwI-JbGNsojunnHbFAc0M4Q','Docs — ARTE','🌍')">🌍 DOCS</button>
  <button class="nav-btn" onclick="activateNav(this);loadRSS('UCqnbDFdCpuN8CMEg0VuEBqA','Trailers','🎞️')">🎞️ TRAILERS</button>
</aside>

<main id="main">
  <h2 id="sec-title" style="font-family:'Bebas Neue'; font-size:40px; letter-spacing:3px; margin-bottom:30px;">À LA UNE</h2>
  <div id="hero-zone" style="margin-bottom:40px;"></div>
  <div class="vgrid" id="grid"></div>
</main>

<div id="modal" onclick="closePlayer()">
  <div class="player-box">
    <iframe id="player" width="100%" height="100%" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
  </div>
</div>

<script>
// Tes vidéos manuelles
const ALUNE = [
  { id:"O-2u2CscyU0", title:"KAIZEN — Everest" },
  { id:"p0Z-9Q_jM2Y", title:"Inoxtag — Départ" },
  { id:"7Xfk9CN6S4E", title:"L'Univers en 1h" }
];

// LE SYSTÈME AUTO-ALIMENTÉ PAR RSS (Pas de limite de quota !)
async function loadRSS(channelId, label, icon) {
  const grid = document.getElementById('grid');
  document.getElementById('sec-title').textContent = label.toUpperCase();
  document.getElementById('hero-zone').innerHTML = '';
  grid.innerHTML = "<p style='color:var(--gold);'>Chargement automatique du cinéma...</p>";

  // On utilise un proxy pour lire le flux YouTube sans erreur 403
  const proxy = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId)}&api_key=oyny6qvxz0v4mcznrtq3qf7zpsm8v0n6jdf3m5bw`;

  try {
    const res = await fetch(proxy);
    const data = await res.json();
    grid.innerHTML = "";
    
    if(data.items) {
      // 1ère vidéo en grand (Hero)
      const firstId = data.items[0].link.split('v=')[1];
      renderHero(firstId, data.items[0].title, icon);
      
      // Les autres dans la grille
      data.items.slice(1, 10).forEach(v => {
        const id = v.link.split('v=')[1];
        grid.innerHTML += `<div class="vcard" onclick="openPlayer('${id}','${v.title.replace(/'/g,"")}')">
          <div class="thumb-box"><img class="vthumb" src="https://img.youtube.com/vi/${id}/mqdefault.jpg"></div>
          <div style="padding:15px; font-weight:bold; font-size:13px;">${v.title}</div>
        </div>`;
      });
    }
  } catch(e) { grid.innerHTML = "Désolé, le projecteur est en panne pour ce flux."; }
}

function renderHero(id, title, icon='🔥') {
  document.getElementById('hero-zone').innerHTML = `
    <div style="position:relative; border-radius:15px; overflow:hidden; aspect-ratio:21/9; cursor:pointer;" onclick="openPlayer('${id}','${title}')">
      <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg" style="width:100%; height:100%; object-fit:cover; filter:brightness(0.6);">
      <div style="position:absolute; bottom:30px; left:30px;">
        <span style="background:var(--gold); color:black; padding:4px 10px; border-radius:5px; font-weight:bold; font-size:12px;">${icon} RÉCENT</span>
        <h3 style="font-family:'Bebas Neue'; font-size:45px; margin-top:10px;">${title}</h3>
      </div>
    </div>`;
}

function displayManual() {
  document.getElementById('sec-title').textContent = 'À LA UNE';
  const grid = document.getElementById('grid');
  grid.innerHTML = "";
  renderHero(ALUNE[0].id, ALUNE[0].title);
  ALUNE.slice(1).forEach(v => {
    grid.innerHTML += `<div class="vcard" onclick="openPlayer('${v.id}','${v.title}')"><div class="thumb-box"><img class="vthumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"></div><div style="padding:15px; font-weight:bold; font-size:13px;">${v.title}</div></div>`;
  });
}

function activateNav(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function openPlayer(id, title) {
  document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  document.getElementById('modal').classList.add('open');
}

function closePlayer() {
  document.getElementById('player').src = "";
  document.getElementById('modal').classList.remove('open');
}

// Lancement après l'intro cinéma (5s)
setTimeout(displayManual, 5500);
</script>
</body>
</html>
