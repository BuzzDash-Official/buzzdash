<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzDash - Final Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9d00ff; --bg: #000000; --side: #080808; --nav-h: 70px; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; }
        
        /* Sidebar avec Paramètres */
        .sidebar { width: 240px; height: 100vh; background: var(--side); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding-top: 80px; z-index: 1001; }
        .side-item { padding: 15px 25px; cursor: pointer; color: #888; transition: 0.2s; font-size: 15px; }
        .side-item.active { border-left: 4px solid var(--accent); color: var(--accent); }
        .settings-header { padding: 15px 25px; cursor: pointer; border-top: 1px solid #1a1a1a; margin-top: 20px; color: #aaa; display: flex; justify-content: space-between; font-size: 13px; }
        .settings-content { max-height: 0; overflow: hidden; transition: 0.3s; background: #050505; }
        .settings-content.open { max-height: 150px; }
        .set-row { padding: 10px 25px; display: flex; justify-content: space-between; font-size: 12px; }

        /* Navigation */
        .nav { height: var(--nav-h); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); position: fixed; top: 0; left: 240px; right: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .logo-abs { position: absolute; left: 30px; font-weight: 900; color: var(--accent); font-size: 24px; text-shadow: 0 0 10px var(--accent); }
        .btn-group { display: flex; gap: 5px; background: #0a0a0a; padding: 5px; border-radius: 30px; border: 1px solid #222; }
        .btn { background: transparent; border: none; color: #555; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .btn.active { background: var(--accent); color: white; }

        /* Viewport */
        #viewport { flex: 1; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        #viewport::-webkit-scrollbar { display: none; }

        .slide { height: 100vh; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 40px; }
        
        /* Zone Vidéo Agrandie */
        .v-box { width: 92%; max-width: 1100px; position: relative; }
        .vertical .v-box { max-width: 450px; }

        .v-card { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        .vertical .v-card { aspect-ratio: 9/16; height: 75vh; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Barre d'infos sous la vidéo */
        .v-info-under { width: 100%; margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-start; border: 1px solid #333; padding: 12px; border-radius: 10px; background: #050505; }
        .pseudo { color: var(--accent); font-weight: 900; font-size: 16px; min-width: 150px; }
        .title { color: white; font-size: 14px; text-align: right; flex: 1; opacity: 0.8; }

        /* Flèches Navigation */
        .nav-arrows { position: fixed; right: 25px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; }
        .arrow { background: #111; border: 1px solid #333; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .arrow:hover { background: var(--accent); border-color: var(--accent); }

        @media (max-width: 1000px) { .sidebar { display: none; } .nav { left: 0; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-item active">🏠 Accueil</div>
        <div class="settings-header" onclick="document.getElementById('set-content').classList.toggle('open')">⚙️ PARAMÈTRES <span>▼</span></div>
        <div id="set-content" class="settings-content">
            <div class="set-row"><span>Son Auto</span> <input type="checkbox" id="p-sound" onchange="saveP()"></div>
            <div class="set-row"><span>Scroll Auto</span> <input type="checkbox" id="p-scroll" onchange="saveP()"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="nav">
            <div class="logo-abs">BUZZDASH</div>
            <div class="btn-group">
                <button id="b-20" class="btn active" onclick="changeMode(20)">Gaming</button>
                <button id="b-24" class="btn" onclick="changeMode(24)">Shorts</button>
            </div>
        </div>

        <div class="nav-arrows">
            <button class="arrow" onclick="manualScroll(-1)">↑</button>
            <button class="arrow" onclick="manualScroll(1)">↓</button>
        </div>

        <div id="viewport"></div>
    </div>

<script>
    const API_KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs'; //
    let mode = 20;

    function saveP() {
        localStorage.setItem('bz-s', document.getElementById('p-sound').checked);
        localStorage.setItem('bz-sc', document.getElementById('p-scroll').checked);
    }

    function manualScroll(dir) {
        document.getElementById('viewport').scrollBy({ top: window.innerHeight * dir, behavior: 'smooth' });
    }

    async function load(cat) {
        mode = cat;
        const vp = document.getElementById('viewport');
        vp.innerHTML = '<p style="text-align:center; margin-top:100px;">Chargement...</p>';
        
        try {
            const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,id&chart=mostPopular&maxResults=12&regionCode=FR&videoCategoryId=${cat}&key=${API_KEY}`);
            const data = await r.json();
            vp.innerHTML = '';

            data.items.forEach(v => {
                const s = document.createElement('div');
                s.className = `slide ${cat === 24 ? 'vertical' : ''}`;
                s.innerHTML = `
                    <div class="v-box">
                        <div class="v-card">
                            <iframe src="https://www.youtube.com/embed/${v.id}?enablejsapi=1&rel=0&autoplay=0&mute=1" allow="autoplay; encrypted-media"></iframe>
                        </div>
                        <div class="v-info-under">
                            <div class="pseudo">@${v.snippet.channelTitle}</div>
                            <div class="title">${v.snippet.title}</div>
                        </div>
                    </div>`;
                vp.appendChild(s);
            });
            initObs();
        } catch(e) { console.error(e); }
    }

    function initObs() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const ifr = entry.target.querySelector('iframe');
                if (entry.isIntersecting) {
                    ifr.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                    if(document.getElementById('p-sound').checked) ifr.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
                } else {
                    ifr.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.slide').forEach(s => observer.observe(s));
    }

    function changeMode(c) {
        document.getElementById('b-20').classList.toggle('active', c === 20);
        document.getElementById('b-24').classList.toggle('active', c === 24);
        load(c);
    }

    window.onload = () => {
        document.getElementById('p-sound').checked = localStorage.getItem('bz-s') === 'true';
        document.getElementById('p-scroll').checked = localStorage.getItem('bz-sc') === 'true';
        load(20);
    };
</script>
</body>
</html>
