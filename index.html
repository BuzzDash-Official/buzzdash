<script>
// Tes vidéos choisies à la main
const ALUNE = [
  { id:"O-2u2CscyU0", title:"KAIZEN — 1 an pour gravir l'Everest" },
  { id:"p0Z-9Q_jM2Y", title:"Inoxtag : Nouveau Départ" },
  { id:"PCMrUGqH6fQ", title:"La face cachée des océans" }
];

// LE MOTEUR AUTO-ALIMENTÉ (RSS)
async function loadRSS(channelId, label, icon) {
  const grid = document.getElementById('grid');
  document.getElementById('sec-title').textContent = label.toUpperCase();
  document.getElementById('hero-zone').innerHTML = '';
  grid.innerHTML = `<div class="loader-wrap"><div class="spinner"></div><p>Récupération auto...</p></div>`;

  // Utilisation d'un convertisseur fiable pour lire le flux YouTube sans clé API
  const proxy = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId)}&api_key=oyny6qvxz0v4mcznrtq3qf7zpsm8v0n6jdf3m5bw`;

  try {
    const res = await fetch(proxy);
    const data = await res.json();
    
    if (!data.items || data.items.length === 0) throw new Error();

    grid.innerHTML = "";
    // On affiche la dernière vidéo de la chaîne en grand
    const firstVid = data.items[0].link.split('v=')[1];
    renderHero(firstVid, data.items[0].title, icon);

    // On remplit la grille avec les autres vidéos
    data.items.slice(1, 12).forEach(v => {
      const id = v.link.split('v=')[1];
      grid.innerHTML += `
        <div class="vcard" onclick="openPlayer('${id}','${v.title.replace(/'/g," ")}')">
          <div class="thumb-box">
            <img class="vthumb" src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
            <div class="voverlay">▶</div>
          </div>
          <div class="vbody"><div class="vtitle">${v.title}</div></div>
        </div>`;
    });
  } catch (e) {
    grid.innerHTML = `<div class="err-box">⚠️ Le flux auto est temporairement indisponible.</div>`;
  }
}

function renderHero(id, title, icon='🔥') {
  document.getElementById('hero-zone').innerHTML = `
    <div class="hero" onclick="openPlayer('${id}','${title.replace(/'/g," ")}')">
      <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg">
      <div class="hero-grad"></div>
      <div class="hero-info">
        <span class="hero-badge">${icon} DERNIÈRE SORTIE</span>
        <div class="hero-title">${title}</div>
        <button class="hero-play">Regarder</button>
      </div>
    </div>`;
}

function displayManual() {
  document.getElementById('sec-title').textContent = 'À LA UNE';
  document.getElementById('hero-zone').innerHTML = '';
  const grid = document.getElementById('grid');
  grid.innerHTML = "";
  renderHero(ALUNE[0].id, ALUNE[0].title);
  ALUNE.slice(1).forEach(v => {
    grid.innerHTML += `<div class="vcard" onclick="openPlayer('${v.id}','${v.title}')"><div class="thumb-box"><img class="vthumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"><div class="voverlay">▶</div></div><div class="vbody"><div class="vtitle">${v.title}</div></div></div>`;
  });
}

// Fonctions utilitaires pour le menu et le player
function activateNav(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function openPlayer(id, title) {
  document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  document.getElementById('modal-ttl').textContent = title;
  document.getElementById('modal').classList.add('open');
}
function closePlayer() {
  document.getElementById('player').src = '';
  document.getElementById('modal').classList.remove('open');
}

// Lancement après l'intro (5.5 secondes)
setTimeout(displayManual, 5500);
</script>
