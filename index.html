<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POPCORN STREAM — CINÉMA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030405; --surface: #0b0e14; --gold: #f5c842; --text: #eaeaea;
    --muted: #667085; --border: rgba(255,255,255,0.05); --sidebar: 240px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; }
  
  /* --- INTRO MASCOTTE (OEIL SUR LE POPCORN) --- */
  #intro {
    position: fixed; inset: 0; z-index: 9999; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: introFade 0.8s ease-in forwards 5s;
  }
  .curtain-l, .curtain-r { position:absolute; top:0; width:50%; height:100%; background:#0a0500; z-index:1; }
  .curtain-l { left:0; transform-origin:left; animation:cL 1.5s forwards .5s; }
  .curtain-r { right:0; transform-origin:right; animation:cR 1.5s forwards .5s; }
  
  .mascot-intro { position:relative; z-index:2; font-size:120px; opacity:0; animation: fadeIn 1s forwards 2s; }
  .eye-on-pop { position:absolute; font-size:40px; top:55%; left:50%; transform:translate(-50%,-50%); animation: eyeBlink 0.3s infinite 3s; }
  .title-intro { font-family:'Bebas Neue'; font-size:60px; color:var(--gold); margin-top:20px; opacity:0; animation: fadeIn 1s forwards 2.5s; letter-spacing: 5px; }

  @keyframes cL { to { transform:scaleX(0); } } @keyframes cR { to { transform:scaleX(0); } }
  @keyframes fadeIn { to { opacity:1; } }
  @keyframes eyeBlink { 0%,85%,100% { transform:translate(-50%,-50%) scaleY(1); } 92% { transform:translate(-50%,-50%) scaleY(.1); } }
  @keyframes introFade { to { opacity:0; visibility:hidden; } }

  /* --- CHARGEMENT (LE POPCORN TOURNE SANS GRANDIR) --- */
  #loader-vid {
    position: fixed; inset: 0; z-index: 8000; background: #000;
    display: none; flex-direction: column; align-items: center; justify-content: center;
  }
  .spin-container { position: relative; animation: spin 1.2s linear infinite; }
  .pop-loader { font-size: 70px; }
  .eye-loader { position: absolute; font-size: 25px; top: 55%; left: 50%; transform: translate(-50%, -50%); }

  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* --- UI INTERFACE --- */
  #sidebar { position:fixed; left:0; top:0; bottom:0; width:var(--sidebar); background:var(--surface); border-right:1px solid var(--border); z-index:100; padding:25px; }
  .nav-btn { background:none; border:none; color:var(--muted); width:100%; text-align:left; padding:12px; font-weight:700; cursor:pointer; border-radius:8px; margin-bottom:5px; font-size: 14px; }
  .nav-btn.active { background:rgba(245,200,66,0.1); color:var(--gold); }
  
  #main { position:fixed; left:var(--sidebar); right:0; top:0; bottom:0; overflow-y:auto; padding:80px 40px; }
  .vgrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:25px; }
  .vcard { background:var(--surface); border-radius:12px; overflow:hidden; border:1px solid var(--border); cursor:pointer; transition:0.3s; }
  .vcard:hover { transform:translateY(-5px); border-color:var(--gold); }

  /* --- MODAL CINÉMA --- */
  #modal { position:fixed; inset:0; background:#000; z-index:9000; display:none; flex-direction: column; align-items:center; justify-content:center; }
  #modal.open { display:flex; }
  .vision-msg { margin-top: 30px; font-family: 'Bebas Neue'; font-size: 35px; color: var(--gold); letter-spacing: 4px; text-shadow: 0 0 10px var(--gold); }
</style>
</head>
<body>

<div id="loader-vid">
    <div class="spin-container">
        <div class="pop-loader">🍿</div>
        <div class="eye-loader">👁️</div>
    </div>
    <div style="font-family:'Bebas Neue'; color:var(--gold); margin-top:40px; font-size:22px;">CHARGEMENT...</div>
</div>

<div id="intro">
  <div class="curtain-l"></div><div class="curtain-r"></div>
  <div class="mascot-intro">🍿<div class="eye-on-pop">👁️</div></div>
  <div class="title-intro">POPCORN STREAM</div>
</div>

<aside id="sidebar">
  <div style="color:var(--gold); font-family:'Bebas Neue'; font-size:24px; margin-bottom:40px;">🍿 POPCORN STREAM</div>
  <button class="nav-btn active" onclick="displayManual()">🔥 À LA UNE</button>
  <button class="nav-btn" onclick="loadCategory('science')">🔬 SCIENCE (NOZMAN)</button>
  <button class="nav-btn" onclick="loadCategory('trailers')">🎬 BANDES-ANNONCES</button>
</aside>

<main id="main">
  <h2 id="sec-title" style="font-family:'Bebas Neue'; font-size:40px; margin-bottom:30px;">À LA UNE</h2>
  <div id="hero-zone"></div>
  <div class="vgrid" id="grid"></div>
</main>

<div id="modal">
    <button style="position:absolute; top:20px; right:30px; color:#fff; background:none; border:1px solid #fff; padding:8px 20px; border-radius:30px; cursor:pointer;" onclick="closePlayer()">FERMER ✕</button>
    <div style="width:90%; max-width:1100px; aspect-ratio:16/9;">
        <iframe id="player" width="100%" height="100%" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
    </div>
    <div class="vision-msg">BON VISIONNAGE</div>
</div>

<script>
const API_KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs';

const CONFIG = {
  science: { id: 'UCaNlbnghtwlsGF-KzAFThqA', label: 'Dr Nozman' },
  trailers: { id: 'UC_i8X3p8oZNaik8X513Zn1Q', label: 'Bandes-Annonces' }
};

function openPlayer(id) {
    const loader = document.getElementById('loader-vid');
    loader.style.display = 'flex';
    setTimeout(() => {
        document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1`;
        document.getElementById('modal').classList.add('open');
        loader.style.display = 'none';
    }, 2000);
}

function closePlayer() {
    document.getElementById('player').src = "";
    document.getElementById('modal').classList.remove('open');
}

async function loadCategory(cat) {
    const grid = document.getElementById('grid');
    grid.innerHTML = "<p>Recherche des bobines...</p>";
    try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CONFIG[cat].id}&part=snippet,id&order=date&maxResults=10&type=video`);
        const data = await res.json();
        grid.innerHTML = "";
        data.items.forEach(v => {
            const id = v.id.videoId;
            grid.innerHTML += `<div class="vcard" onclick="openPlayer('${id}')"><img style="width:100%" src="https://img.youtube.com/vi/${id}/mqdefault.jpg"><div style="padding:10px; font-size:12px;">${v.snippet.title}</div></div>`;
        });
    } catch(e) { grid.innerHTML = "Erreur de connexion."; }
}

function displayManual() {
    document.getElementById('grid').innerHTML = `<div class="vcard" onclick="openPlayer('O-2u2CscyU0')"><img style="width:100%" src="https://img.youtube.com/vi/O-2u2CscyU0/mqdefault.jpg"><div style="padding:10px;">KAIZEN — Everest</div></div>`;
}

setTimeout(displayManual, 5500);
</script>
</body>
</html>
