<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPCORN TV LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --txt: #ffffff; --acc: #facc15; --side: #0d0d0d; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }

        /* INTRO STUDIO CENTRÉE */
        #intro { position: fixed; inset: 0; z-index: 9999; background: black; display: flex; justify-content: center; align-items: center; animation: fadeOut 0.8s forwards 4s; }
        .m-box { position: relative; display: flex; align-items: center; gap: 20px; animation: swirl 1.2s ease-out; }
        .m-pop { font-size: 110px; filter: drop-shadow(0 0 25px var(--acc)); position: relative; display: flex; align-items: center; justify-content: center; }
        .m-eye { position: absolute; font-size: 45px; top: 50%; left: 50%; transform: translate(-50%, -15%) scale(0); opacity: 0; animation: eyeIn 0.5s forwards 1.5s, blink 0.3s infinite 3s; }
        @keyframes eyeIn { to { opacity: 1; transform: translate(-50%, -15%) scale(1); } }
        @keyframes blink { 0%, 90%, 100% { transform: translate(-50%, -15%) scaleY(1); } 95% { transform: translate(-50%, -15%) scaleY(0.1); } }
        @keyframes swirl { from { transform: rotate(-180deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* UI STRUCTURE */
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--side); border-right: 1px solid rgba(255,255,255,0.05); padding: 30px; z-index: 100; }
        .content { margin-left: 260px; padding: 110px 40px 40px; height: 100vh; overflow-y: auto; }
        .card { background: rgba(255,255,255,0.03); border-radius: 15px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .card:hover { border-color: var(--acc); transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        
        #modal { position: fixed; inset: 0; background: black; z-index: 2000; display: none; justify-content: center; align-items: center; }
        #modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="m-box">
            <div class="m-pop">🍿<div class="m-eye">👁️</div></div>
            <div class="m-name text-yellow-500 font-black text-4xl uppercase">Popcorn<br><span class="text-white">Stream</span></div>
        </div>
    </div>

    <aside class="sidebar">
        <h1 class="text-xl font-black text-yellow-500 mb-10 uppercase italic">Popcorn Stream</h1>
        <nav class="space-y-4 font-bold text-gray-400 text-sm">
            <button onclick="displayManual('ALUNE')" class="w-full text-left p-3 rounded-xl hover:bg-yellow-500 hover:text-black transition">🔥 À LA UNE (TOP BUZZ)</button>
            <hr class="opacity-10">
            <p class="px-3 text-[10px] uppercase tracking-widest opacity-30">Chaînes Auto</p>
            <button onclick="loadRSS('UC_7PruREHpxn-A87A-D-5_A', '🎞️ BANDES-ANNONCES')" class="w-full text-left p-3 rounded-xl hover:bg-yellow-500 hover:text-black transition">🎞️ BANDES-ANNONCES</button>
            <button onclick="loadRSS('UCwI-JbGNsojunnHbFAc0M4Q', '🌍 DOCUMENTAIRES')" class="w-full text-left p-3 rounded-xl hover:bg-yellow-500 hover:text-black transition">🌍 DOCUMENTAIRES</button>
        </nav>
    </aside>

    <main class="content">
        <h2 id="title" class="text-3xl font-black mb-10 italic uppercase">Chargement...</h2>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <div id="modal">
        <button onclick="closeP()" class="absolute top-8 right-8 text-white font-bold border px-6 py-2 rounded-full">FERMER</button>
        <div class="w-[90%] max-w-5xl aspect-video"><iframe id="player" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
    </div>

    <script>
        // TA ZONE PERSONNELLE
        const manualLibrary = {
            ALUNE: [
                { id: "O-2u2CscyU0", title: "KAIZEN - 1 an pour gravir l'Everest (Inoxtag)" },
                { id: "vO6v6tY2hGk", title: "L'ascension d'un génie - Reportage" }
            ]
        };

        // FONCTION AUTOMATIQUE RSS (Zéro Quota Google)
        async function loadRSS(channelId, label) {
            const grid = document.getElementById('grid');
            document.getElementById('title').innerText = label;
            grid.innerHTML = "<p class='col-span-full text-center py-20 animate-pulse'>Récupération du flux TV...</p>";

            const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
            const finalUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            try {
                const res = await fetch(finalUrl);
                const data = await res.json();
                grid.innerHTML = "";
                
                data.items.forEach(item => {
                    const videoId = item.link.split('v=')[1];
                    grid.innerHTML += `
                        <div class="card" onclick="openP('${videoId}')">
                            <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg" onerror="this.src='${item.thumbnail}'">
                            <div class="p-4">
                                <h3 class="font-bold text-sm line-clamp-2">${item.title}</h3>
                                <p class="text-[9px] text-yellow-500 mt-2 font-black">AJOUTÉ RÉCEMMENT</p>
                            </div>
                        </div>`;
                });
            } catch (e) {
                grid.innerHTML = "<p class='col-span-full text-center text-red-500'>Désolé, la chaîne est temporairement indisponible.</p>";
            }
        }

        function displayManual(cat) {
            const grid = document.getElementById('grid');
            document.getElementById('title').innerText = "🔥 À LA UNE";
            grid.innerHTML = "";
            manualLibrary[cat].forEach(item => {
                grid.innerHTML += `
                    <div class="card" onclick="openP('${item.id}')">
                        <img src="https://img.youtube.com/vi/${item.id}/maxresdefault.jpg">
                        <div class="p-4"><h3 class="font-bold text-sm">${item.title}</h3></div>
                    </div>`;
            });
        }

        function openP(id) { document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`; document.getElementById('modal').classList.add('active'); }
        function closeP() { document.getElementById('player').src = ""; document.getElementById('modal').classList.remove('active'); }

        setTimeout(() => displayManual('ALUNE'), 4200);
    </script>
</body>
</html>
