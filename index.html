<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzDash | L'Empire du Flux</title>
    <style>
        :root { --accent: #ff0050; --bg: #050505; --card: #121212; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Menu */
        .nav { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; box-sizing: border-box; }
        .logo { font-weight: 900; color: var(--accent); font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .mode-switch { display: flex; gap: 10px; }
        .btn { background: #222; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* Conteneur de Scroll */
        #viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        #viewport::-webkit-scrollbar { display: none; }

        .slide { height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; position: relative; padding-top: 35px; box-sizing: border-box; }
        
        /* Cadrage Vidéo Dynamique */
        .v-wrapper { width: 90%; max-width: 1000px; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #222; transition: 0.5s; }
        .vertical .v-wrapper { max-width: 400px; aspect-ratio: 9 / 16; height: 85vh; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Flèches de navigation */
        .nav-arrows { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .arrow { background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; backdrop-filter: blur(5px); }
        .arrow:hover { background: var(--accent); }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">BUZZDASH</div>
    <div class="mode-switch">
        <button id="b-gaming" class="btn active" onclick="changeMode('gaming')">GAMING</button>
        <button id="b-shorts" class="btn" onclick="changeMode('shorts')">SHORTS</button>
    </div>
</div>

<div class="nav-arrows">
    <button class="arrow" onclick="scrollMove(-1)">↑</button>
    <button class="arrow" onclick="scrollMove(1)">↓</button>
</div>

<div id="viewport"></div>

<script>
    const API_KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs'; 
    let currentMode = 'gaming';

    async function fetchVideos(catId) {
        const container = document.getElementById('viewport');
        container.innerHTML = '<p style="text-align:center; margin-top:100px;">Chargement du flux...</p>';
        
        try {
            const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=id&chart=mostPopular&maxResults=15&regionCode=FR&videoCategoryId=${catId}&key=${API_KEY}`);
            const d = await r.json();
            container.innerHTML = '';
            
            d.items.forEach(v => {
                const s = document.createElement('div');
                s.className = `slide ${currentMode === 'shorts' ? 'vertical' : ''}`;
                // On ajoute enablejsapi=1 pour pouvoir contrôler la vidéo
                s.innerHTML = `
                    <div class="v-wrapper">
                        <iframe class="yt-player" src="https://www.youtube.com/embed/${v.id}?enablejsapi=1&autoplay=0&mute=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    </div>`;
                container.appendChild(s);
            });
        } catch (e) { alert("Erreur API"); }
    }

    // Gestion du scroll et du son
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const iframe = entry.target.querySelector('iframe');
            if (entry.isIntersecting) {
                // Play la vidéo visible
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            } else {
                // Pause la vidéo qui sort de l'écran
                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            }
        });
    }, { threshold: 0.6 });

    // On observe chaque slide après le rendu
    function startObserving() {
        setTimeout(() => {
            document.querySelectorAll('.slide').forEach(s => observer.observe(s));
        }, 1000);
    }

    function changeMode(mode) {
        currentMode = mode;
        document.getElementById('b-gaming').classList.toggle('active', mode === 'gaming');
        document.getElementById('b-shorts').classList.toggle('active', mode === 'shorts');
        fetchVideos(mode === 'gaming' ? 20 : 24).then(startObserving);
    }

    function scrollMove(dir) {
        const v = document.getElementById('viewport');
        v.scrollBy(0, window.innerHeight * dir);
    }

    fetchVideos(20).then(startObserving);
</script>
</body>
</html>
