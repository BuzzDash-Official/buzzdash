<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopCorn Stream | Premium Cinema</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap');

        :root {
            --gold: #FFD700;
            --danger: #E50914;
            --bg-body: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --shadow-gold: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            margin: 0; background-color: var(--bg-body); color: #fff;
            font-family: 'Montserrat', sans-serif; overflow-x: hidden;
        }

        /* --- 1. INTRO CINÉMATIQUE EMOJI 🍿 --- */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .pop-wrapper {
            font-size: 100px; 
            animation: spinStable 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .eye-container {
            width: 80px; height: 45px; background: #fff; border-radius: 50%;
            border: 5px solid #000; position: relative; overflow: hidden;
            margin-top: -30px; opacity: 0; transform: scale(0);
            animation: eyePop 0.5s forwards 1.6s, blink 3s infinite 2.5s;
        }

        .eye-container::after {
            content: ''; position: absolute; width: 30px; height: 30px; 
            background: #000; border-radius: 50%; top: 5px; left: 25px;
        }

        .brand-reveal {
            font-family: 'Bebas Neue'; font-size: 4rem; color: var(--gold);
            letter-spacing: 5px; opacity: 0; transform: translateY(30px);
            animation: textReveal 0.8s forwards 2.2s;
        }

        @keyframes spinStable { 0% { transform: rotate(-720deg) scale(0); } 100% { transform: rotate(0deg) scale(1); } }
        @keyframes eyePop { to { opacity: 1; transform: scale(1); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        @keyframes textReveal { to { opacity: 1; transform: translateY(0); } }

        /* --- 2. HEADER & NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, #000, transparent);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .logo { font-family: 'Bebas Neue'; font-size: 40px; color: var(--gold); cursor: pointer; }
        .nav-items span { margin: 0 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; }
        .nav-items span:hover { color: var(--gold); text-shadow: var(--shadow-gold); }

        /* --- 3. SECTION À LA UNE --- */
        .hero {
            padding: 120px 5% 40px; max-width: 1400px; margin: auto;
        }

        .featured-video {
            border-radius: 30px; overflow: hidden; border: 4px solid var(--glass);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative;
        }

        .video-player { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-player iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

        /* --- 4. FILTRES ET GRILLE --- */
        .category-bar { padding: 40px 5% 20px; display: flex; gap: 15px; overflow-x: auto; }
        .filter-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 10px 25px; border-radius: 30px; cursor: pointer; white-space: nowrap;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        .movie-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px; padding: 0 5% 100px;
        }

        .movie-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--glass); cursor: pointer;
        }
        .movie-card:hover { transform: scale(1.05); box-shadow: var(--shadow-gold); border-color: var(--gold); }
        .movie-card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; }

        /* --- 5. RIDEAU CINÉMA (PLAY ANIMATION) --- */
        #cinema-mode {
            position: fixed; inset: 0; background: #000; z-index: 200000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        .spin-loader { font-size: 80px; animation: rotating 1.2s infinite linear; }
        @keyframes rotating { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="pop-wrapper">🍿</div>
        <div class="eye-container"></div>
        <div class="brand-reveal">POPCORN STREAM</div>
    </div>

    <div id="cinema-mode">
        <div id="curtain-loader">
            <div class="spin-loader">🍿</div>
            <h2 style="color: var(--gold); font-family: 'Bebas Neue'; letter-spacing: 3px;">OUVERTURE DU RIDEAU...</h2>
        </div>
        <div id="theater" style="display:none; width: 90%; max-width: 1200px; text-align: center;">
            <div class="video-player" style="border: 2px solid var(--gold); border-radius: 15px; overflow: hidden;">
                <iframe id="video-frame" src="" allowfullscreen></iframe>
            </div>
            <h1 style="color: var(--gold); font-family: 'Bebas Neue'; margin-top: 20px; font-size: 3rem;">BON VISIONNAGE !</h1>
            <button onclick="closeTheater()" style="background:none; border: 1px solid #fff; color:#fff; padding: 10px 30px; cursor:pointer;">QUITTER LA SALLE</button>
        </div>
    </div>

    <nav>
        <div class="logo" onclick="location.reload()">POPCORN STREAM</div>
        <div class="nav-items">
            <span onclick="filter('all')">Accueil</span>
            <span onclick="filter('jeux-video')">Jeux Vidéo</span>
            <span onclick="filter('horreur')">Horreur</span>
            <span onclick="filter('zone-neutre')">Zone Neutre</span>
        </div>
        <button class="filter-btn" style="border:1px solid gold" onclick="toggleLight()">🔆 LUMINOSITÉ</button>
    </nav>

    <header class="hero">
        <h2 style="font-family: 'Bebas Neue'; color: var(--gold); letter-spacing: 2px;">À LA UNE</h2>
        <div class="featured-video">
            <div class="video-player">
                <iframe src="https://www.youtube.com/embed/wrFsapf0Enk?autoplay=0&controls=1" allowfullscreen></iframe>
            </div>
        </div>
    </header>

    <div class="category-bar">
        <button class="filter-btn active" onclick="filter('all', this)">TOUT</button>
        <button class="filter-btn" onclick="filter('jeux-video', this)">JEUX VIDÉO</button>
        <button class="filter-btn" onclick="filter('horreur', this)">HORREUR</button>
        <button class="filter-btn" onclick="filter('zone-neutre', this)">ZONE NEUTRE</button>
        <button class="filter-btn" onclick="filter('science', this)">SCIENCE</button>
    </div>

    <main class="movie-grid" id="main-grid">
        </main>

    <script>
        const MOVIES = [
            { id: 'LpZ6S8-IUKw', title: 'Science du futur', cat: 'science', author: 'Dr Nozman' },
            { id: 'v5E4_6XfM-A', title: 'La Nuit de l\'Horreur', cat: 'horreur', author: 'Squeezie' },
            { id: '6VgKYd0JWq4', title: 'Kaizen : Le Trailer', cat: 'zone-neutre', author: 'Inoxtag' },
            { id: 'Xj_XvW5WfWk', title: 'Elden Ring Masterclass', cat: 'jeux-video', author: 'GamerX' },
            { id: 'p6v6lO2vE7E', title: 'Phasmo VR : Terreur', cat: 'horreur', author: 'Shadow' }
        ];

        // --- 1. INTRO DYNAMIQUE ---
        setTimeout(() => {
            document.getElementById('loading-screen').style.transform = "translateY(-100%)";
            document.body.style.overflow = "auto";
        }, 4500);

        // --- 2. LOGIQUE DES FILTRES ---
        function filter(tag, btn) {
            const grid = document.getElementById('main-grid');
            const data = tag === 'all' ? MOVIES : MOVIES.filter(m => m.cat === tag);
            
            if(btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            grid.innerHTML = data.map(m => `
                <div class="movie-card" onclick="openTheater('${m.id}')">
                    <img src="https://img.youtube.com/vi/${m.id}/maxresdefault.jpg">
                    <div class="card-info">
                        <h3 style="margin:0; color:var(--gold);">${m.title}</h3>
                        <p style="margin:5px 0 0; font-size:0.8rem; opacity:0.7;">${m.author}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- 3. CINÉMA (RIDEAU + BON VISIONNAGE) ---
        function openTheater(id) {
            const cinema = document.getElementById('cinema-mode');
            const loader = document.getElementById('curtain-loader');
            const theater = document.getElementById('theater');
            const frame = document.getElementById('video-frame');

            cinema.style.display = 'flex';
            loader.style.display = 'block';
            theater.style.display = 'none';

            setTimeout(() => {
                loader.style.display = 'none';
                theater.style.display = 'block';
                frame.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            }, 2200);
        }

        function closeTheater() {
            document.getElementById('cinema-mode').style.display = 'none';
            document.getElementById('video-frame').src = "";
        }

        function toggleLight() {
            document.body.style.filter = document.body.style.filter === 'brightness(0.3)' ? 'brightness(1)' : 'brightness(0.3)';
        }

        window.onload = () => filter('all');
    </script>
</body>
</html>
