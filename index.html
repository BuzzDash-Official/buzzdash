<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPCORN PRIVATE ARCHIVES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --txt: #ffffff; --acc: #facc15; --side: #0d0d0d; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }

        /* INTRO CINÉMATIQUE (OEIL CENTRÉ) */
        #intro { position: fixed; inset: 0; z-index: 9999; background: black; display: flex; justify-content: center; align-items: center; animation: fadeOut 0.8s forwards 4s; }
        .m-box { position: relative; display: flex; align-items: center; gap: 20px; animation: swirl 1.2s ease-out; }
        .m-pop { font-size: 110px; filter: drop-shadow(0 0 25px var(--acc)); position: relative; display: flex; align-items: center; justify-content: center; }
        .m-eye { position: absolute; font-size: 45px; top: 50%; left: 50%; transform: translate(-50%, -15%) scale(0); opacity: 0; animation: eyeIn 0.5s forwards 1.5s, blink 0.3s infinite 3s; }
        @keyframes eyeIn { to { opacity: 1; transform: translate(-50%, -15%) scale(1); } }
        @keyframes blink { 0%, 90%, 100% { transform: translate(-50%, -15%) scaleY(1); } 95% { transform: translate(-50%, -15%) scaleY(0.1); } }
        @keyframes swirl { from { transform: rotate(-180deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* UI STRUCTURE */
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--side); border-right: 1px solid rgba(255,255,255,0.05); padding: 30px; z-index: 100; }
        .topbar { position: fixed; top: 0; left: 260px; right: 0; height: 80px; background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 40px; z-index: 50; }
        .content { margin-left: 260px; padding: 110px 40px 40px; height: 100vh; overflow-y: auto; scroll-behavior: smooth; }

        /* CARDS */
        .card { background: rgba(255,255,255,0.03); border-radius: 15px; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border: 1px solid transparent; position: relative; }
        .card:hover { border-color: var(--acc); transform: translateY(-8px); background: rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; aspect-ratio: 16/9; object-cover: cover; }
        
        /* PLAYER MODAL */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        #modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="m-box">
            <div class="m-pop">🍿<div class="m-eye">👁️</div></div>
            <div class="m-name text-yellow-500 font-black text-4xl uppercase">Popcorn<br><span class="text-white font-light">Stream</span></div>
        </div>
    </div>

    <aside class="sidebar">
        <h1 class="text-xl font-black text-yellow-500 italic mb-10 tracking-tighter uppercase">Popcorn Stream</h1>
        <nav class="space-y-4 font-bold text-gray-400">
            <button onclick="displayCat('ALUNE')" class="w-full text-left p-3 rounded-xl hover:bg-yellow-500 hover:text-black transition-all">🔥 À LA UNE</button>
            <button onclick="displayCat('DOCS')" class="w-full text-left p-3 rounded-xl hover:bg-yellow-500 hover:text-black transition-all">🌍 DOCUMENTAIRES</button>
            <button onclick="displayCat('ACTION')" class="w-full text-left p-3 rounded-xl hover:bg-yellow-500 hover:text-black transition-all">🎬 ACTION</button>
            <button onclick="displayCat('TRAILERS')" class="w-full text-left p-3 rounded-xl hover:bg-yellow-500 hover:text-black transition-all">🎞️ BANDES-ANNONCES</button>
        </nav>
    </aside>

    <header class="topbar">
        <input type="text" id="search" oninput="searchInLib(this.value)" placeholder="Chercher dans vos dossiers..." class="w-full max-w-xl bg-white/5 border border-white/10 rounded-2xl px-8 py-3 outline-none focus:border-yellow-500 transition-all">
    </header>

    <main class="content">
        <h2 id="title" class="text-4xl font-black mb-10 italic uppercase tracking-tighter text-white">Sélectionnez une catégorie</h2>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <div id="modal">
        <button onclick="closeP()" class="absolute top-8 right-8 text-white font-bold border-2 border-white/20 px-6 py-2 rounded-full hover:bg-white hover:text-black transition">QUITTER LA SÉANCE</button>
        <div class="w-[90%] max-w-6xl aspect-video shadow-2xl rounded-2xl overflow-hidden border-4 border-white/5">
            <iframe id="player" width="100%" height="100%" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // ============================================================
        // 📦 TES DOSSIERS DE FILMS (MODIFIE UNIQUEMENT CETTE ZONE)
        // ============================================================
        
        const library = {
            
            // 🔥 DOSSIER : À LA UNE
            ALUNE: [
                { id: "vG5D0kfqV7c", title: "J’ai traversé une chaîne de montagnes ENTIÈRE seul à 15 ans ! (2 semaines de marche non-stop)" },
                { id: "vO6v6tY2hGk", title: "L'ascension d'un génie" }
            ],

            // 🌍 DOSSIER : DOCUMENTAIRES
            DOCS: [
                { id: "5p248p6ObzU", title: "Le mystère des pyramides" },
                { id: "7E89W9iE0Gk", title: "La vie sauvage en 4K" }
            ],

            // 🎬 DOSSIER : ACTION
            ACTION: [
                { id: "9_m8pE5_C3s", title: "Course poursuite extrême" },
                { id: "p0Z-9Q_jM2Y", title: "Mission Impossible : Fan Made" }
            ],

            // 🎞️ DOSSIER : BANDES-ANNONCES
            TRAILERS: [
                { id: "XW2E26nREhk", title: "GTA VI Trailer Officiel" },
                { id: "mqqft22hyMT", title: "Batman 2 Preview" }
            ]

        };

        // ============================================================
        // ⚙️ LOGIQUE DU SITE (NE PAS TOUCHER SAUF SI TU ES SÛR)
        // ============================================================

        function displayCat(cat) {
            const grid = document.getElementById('grid');
            document.getElementById('title').innerText = cat.replace('ALUNE', 'À LA UNE');
            grid.innerHTML = "";
            
            library[cat].forEach(item => {
                grid.innerHTML += `
                    <div class="card" onclick="openP('${item.id}')">
                        <img src="https://img.youtube.com/vi/${item.id}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${item.id}/0.jpg'">
                        <div class="p-5">
                            <h3 class="font-bold text-sm line-clamp-2 text-gray-200">${item.title}</h3>
                            <div class="mt-4 flex items-center text-[10px] text-yellow-500 font-black tracking-widest uppercase">
                                <span class="bg-yellow-500/10 px-2 py-1 rounded">HD STREAMING</span>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function searchInLib(val) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            const search = val.toLowerCase();

            for (let folder in library) {
                library[folder].forEach(item => {
                    if (item.title.toLowerCase().includes(search)) {
                        grid.innerHTML += `
                            <div class="card" onclick="openP('${item.id}')">
                                <img src="https://img.youtube.com/vi/${item.id}/0.jpg">
                                <div class="p-5">
                                    <h3 class="font-bold text-sm">${item.title}</h3>
                                </div>
                            </div>`;
                    }
                });
            }
        }

        function openP(id) {
            document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0`;
            document.getElementById('modal').classList.add('active');
        }

        function closeP() {
            document.getElementById('player').src = "";
            document.getElementById('modal').classList.remove('active');
        }

        // Lancement par défaut sur les nouveautés
        setTimeout(() => displayCat('ALUNE'), 4200);
    </script>
</body>
</html>
