<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPCORN STREAM - REPTILE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --txt: #ffffff; --acc: #facc15; --side: #0d0d0d; }
        body.light-mode { --bg: #f4f4f5; --txt: #18181b; --side: #ffffff; --acc: #eab308; }
        
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; transition: 0.3s; }

        /* --- INTRO CINÉMATIQUE VIOLETTE --- */
        #intro { 
            position: fixed; inset: 0; z-index: 9999; background: black; 
            display: flex; justify-content: center; align-items: center; 
            animation: fadeOut 0.8s forwards 5s; 
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.2) 0%, rgba(0,0,0,1) 75%);
        }
        .m-pop { font-size: 110px; filter: drop-shadow(0 0 25px var(--acc)); position: relative; animation: swirl 1.5s ease-out; }
        .m-eye { position: absolute; font-size: 45px; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); opacity: 0; animation: eyeIn 0.5s forwards 1.8s, blink 0.3s infinite 4s; }
        .m-name { font-family: 'Syncopate'; font-size: 40px; color: var(--acc); opacity: 0; filter: blur(10px); animation: blurClear 1.2s forwards 2.8s; margin-left: 20px; }

        @keyframes swirl { from { transform: rotate(-180deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
        @keyframes eyeIn { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes blink { 0%, 90%, 100% { transform: translate(-50%, -50%) scaleY(1); } 95% { transform: translate(-50%, -50%) scaleY(0.1); } }
        @keyframes blurClear { to { opacity: 1; filter: blur(0); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- UI --- */
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--side); border-right: 1px solid rgba(255,255,255,0.05); padding: 30px; z-index: 100; display: flex; flex-column: column; }
        .content { margin-left: 260px; padding: 110px 40px 40px; height: 100vh; overflow-y: auto; }
        .topbar { position: fixed; top: 0; left: 260px; right: 0; height: 80px; background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 40px; z-index: 50; }
        
        .card { background: rgba(128,128,128,0.1); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* MENU PARAMÈTRES RÉPARÉ */
        #settings-menu { display: none; background: rgba(128,128,128,0.05); border-radius: 8px; padding: 10px; margin-top: 10px; }
        #settings-menu.open { display: block; }
        
        #modal { position: fixed; inset: 0; background: black; z-index: 2000; display: none; justify-content: center; align-items: center; }
        #modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="m-pop">🍿<div class="m-eye">👁️</div></div>
        <div class="m-name">Popcorn<br><span style="color:white">Stream</span></div>
    </div>

    <aside class="sidebar flex flex-col justify-between">
        <div>
            <h1 class="text-xl font-black text-yellow-500 mb-10 italic">POPCORN STREAM</h1>
            <nav class="space-y-4 font-bold text-gray-400">
                <button onclick="displayManual('ALUNE')" class="w-full text-left hover:text-yellow-500">🔥 À LA UNE</button>
                <button onclick="loadRSS('UC_7PruREHpxn-A87A-D-5_A', '🎞️ BANDES-ANNONCES')" class="w-full text-left hover:text-yellow-500">🎞️ ACTION / TRAILERS</button>
                <button onclick="loadRSS('UCwI-JbGNsojunnHbFAc0M4Q', '🌍 DOCUMENTAIRES')" class="w-full text-left hover:text-yellow-500">🌍 DOCUMENTAIRES</button>
            </nav>
        </div>

        <div>
            <button onclick="toggleSettings()" class="w-full text-left text-[11px] font-black opacity-50 hover:opacity-100 transition">⚙️ PARAMÈTRES ▼</button>
            <div id="settings-menu" class="text-[10px] space-y-2">
                <div class="flex justify-between"><span>PAYS :</span><b class="text-yellow-500">FRANCE</b></div>
                <button onclick="toggleTheme()" id="themeBtn" class="w-full bg-yellow-500 text-black font-bold py-1 rounded mt-2 uppercase">Mode Lumière</button>
            </div>
        </div>
    </aside>

    <header class="topbar">
        <input type="text" id="search" placeholder="Kaizen, Inoxtag..." class="w-full max-w-lg bg-white/5 border border-white/10 rounded-lg px-5 py-2 outline-none focus:border-yellow-500">
    </header>

    <main class="content">
        <h2 id="title" class="text-3xl font-black mb-10 italic uppercase">Chargement...</h2>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="modal">
        <button onclick="closeP()" class="absolute top-5 right-5 text-white border px-4 py-1 rounded-full">X</button>
        <div class="w-[90%] max-w-5xl aspect-video"><iframe id="player" width="100%" height="100%" frameborder="0" allowfullscreen></iframe></div>
    </div>

    <script>
        // DONNÉES MANUELLES
        const lib = { ALUNE: [{ id: "O-2u2CscyU0", title: "KAIZEN - 1 an pour gravir l'Everest" }, { id: "p0Z-9Q_jM2Y", title: "Inoxtag : Nouveau départ" }] };

        // FONCTION RSS (Zéro Quota - ÇA MARCHE !)
        async function loadRSS(id, label) {
            const grid = document.getElementById('grid');
            document.getElementById('title').innerText = label;
            grid.innerHTML = "<p class='col-span-full text-center py-20 animate-pulse text-yellow-500'>Veuillez patienter...</p>";
            
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id='+id)}&api_key=oyny6qvxz0v4mcznrtq3qf7zpsm8v0n6jdf3m5bw`);
                const data = await res.json();
                grid.innerHTML = "";
                data.items.forEach(v => {
                    const vid = v.link.split('v=')[1];
                    grid.innerHTML += `<div class="card" onclick="openP('${vid}')"><img src="https://img.youtube.com/vi/${vid}/maxresdefault.jpg" class="w-full"><div class="p-4 font-bold text-sm">${v.title}</div></div>`;
                });
            } catch(e) { grid.innerHTML = "<p class='text-red-500 text-center col-span-full'>Erreur de chargement des vidéos.</p>"; }
        }

        function displayManual(cat) {
            const grid = document.getElementById('grid');
            document.getElementById('title').innerText = "À LA UNE";
            grid.innerHTML = "";
            lib[cat].forEach(v => {
                grid.innerHTML += `<div class="card" onclick="openP('${v.id}')"><img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" class="w-full"><div class="p-4 font-bold text-sm">${v.title}</div></div>`;
            });
        }

        // PARAMÈTRES RÉPARÉS
        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }
        
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('themeBtn').innerText = isLight ? "Mode Sombre" : "Mode Lumière";
        }

        function openP(id) { document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`; document.getElementById('modal').classList.add('active'); }
        function closeP() { document.getElementById('player').src = ""; document.getElementById('modal').classList.remove('active'); }

        setTimeout(() => displayManual('ALUNE'), 5500);
    </script>
</body>
</html>
