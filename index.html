<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>THE CIRCLE | MonEmpireAuto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: serif; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="text-6xl mb-8">👁️</div>
    <h1 class="text-xs tracking-[0.5em] text-gray-500 mb-10">MEMBRE DU CERCLE UNIQUEMENT</h1>
    
    <div class="w-full max-w-2xl glass p-4 rounded-full flex">
        <input id="input" class="bg-transparent flex-1 p-4 outline-none text-white" placeholder="Interrogez l'Oracle sur votre futur profit...">
        <button onclick="ask()" id="btn" class="bg-[#d4af37] text-black px-8 py-4 rounded-full font-bold uppercase text-xs">Interroger</button>
    </div>

    <div id="result" class="hidden mt-12 w-full max-w-2xl animate-fade-in">
        <div class="glass p-8 rounded-3xl">
            <h2 id="title" class="text-2xl font-bold mb-4 border-b border-amber-900 pb-2"></h2>
            <div id="plan" class="text-gray-400 space-y-4"></div>
            <div class="mt-8 text-white font-bold text-xl">PROFIT : <span id="cash" class="text-green-500"></span></div>
        </div>
    </div>

    <script>
        async function ask() {
            const prompt = document.getElementById('input').value;
            const btn = document.getElementById('btn');
            // ⚠️ METS TA CLÉ GROQ ICI JUSTE POUR TESTER (ENTRE LES GUILLEMETS)
            const key = "TA_CLE_GROQ_ICI"; 

            if(!prompt) return;
            btn.innerText = "ANALYSE...";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "system", content: "Expert business. Réponds en JSON: {\"n\":\"Nom\",\"p\":\"Plan\",\"c\":\"Cash\"}" }, { role: "user", content: prompt }],
                        response_format: { type: "json_object" }
                    })
                });
                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                document.getElementById('title').innerText = res.n;
                document.getElementById('plan').innerText = res.p;
                document.getElementById('cash').innerText = res.c;
                document.getElementById('result').classList.remove('hidden');
            } catch (e) { alert("Accès refusé. Clé invalide."); }
            btn.innerText = "Interroger";
        }
    </script>
</body>
</html>
