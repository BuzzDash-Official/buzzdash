<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzDash | Stable Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9d00ff; --bg: #000000; --side: #0a0a0a; --nav-h: 70px; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; height: 100vh; background: var(--side); border-right: 1px solid #222; display: flex; flex-direction: column; padding-top: 80px; z-index: 1001; }
        .side-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: 700; color: #aaa; }
        .side-item.active { border-left: 4px solid var(--accent); color: var(--accent); }

        /* Settings */
        .settings-header { color: #aaa; padding: 10px 25px; cursor: pointer; display: flex; justify-content: space-between; margin-top: 30px; border-top: 1px solid #1a1a1a; font-weight: bold; }
        .settings-content { overflow: hidden; max-height: 0; transition: max-height 0.3s ease-out; background: #080808; }
        .settings-content.open { max-height: 200px; }
        .setting-row { padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        
        /* Main */
        .main-content { flex: 1; height: 100vh; position: relative; }
        .nav { height: var(--nav-h); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); position: fixed; top: 0; left: 250px; right: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo-abs { position: absolute; left: 30px; font-weight: 900; color: var(--accent) !important; font-size: 26px; text-transform: uppercase; }
        
        .btn-group { display: flex; gap: 8px; background: #0a0a0a; padding: 6px; border-radius: 30px; border: 1px solid #222; }
        .btn { background: transparent; border: none; color: #888; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .btn.active { background: var(--accent); color: white; }

        #viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        #viewport::-webkit-scrollbar { display: none; }

        .slide { height: 100vh; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: var(--nav-h); box-sizing: border-box; }
        .v-card { width: 90%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid #222; }
        .vertical .v-card { max-width: 400px; height: 85vh; aspect-ratio: unset; }
        .v-info { margin-top: 10px; width: 90%; max-width: 850px; color: var(--accent); font-weight: bold; }

        .arrows { position: fixed; right: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; }
        .arr-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #333; background: #111; color: white; cursor: pointer; font-size: 20px; }
        .arr-btn:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-item active">🏠 Accueil</div>
        <div class="settings-header" onclick="toggleSettings()">⚙️ Paramètres <span id="set-icon">▼</span></div>
        <div id="set-panel" class="settings-content">
            <div class="setting-row">
                <span>Son Auto</span>
                <input type="checkbox" id="set-sound" onchange="silentSave()">
            </div>
            <div class="setting-row">
                <span>Scroll Auto</span>
                <input type="checkbox" id="set-autoscroll" onchange="silentSave()">
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="nav">
            <div class="logo-abs">BUZZDASH</div>
            <div class="btn-group">
                <button id="b-gaming" class="btn active" onclick="changeMode('gaming')">Gaming</button>
                <button id="b-shorts" class="btn" onclick="changeMode('shorts')">Shorts</button>
            </div>
        </div>
        <div class="arrows">
            <button class="arr-btn" onclick="scrollMove(-1)">↑</button>
            <button class="arr-btn" onclick="scrollMove(1)">↓</button>
        </div>
        <div id="viewport"></div>
    </div>

<script>
    const API_KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs'; //
    let currentMode = 'gaming';
    let ytPlayers = {}; 

    // API YouTube
    let tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function silentSave() {
        localStorage.setItem('buzz-sound', document.getElementById('set-sound').checked);
        localStorage.setItem('buzz-auto', document.getElementById('set-autoscroll').checked);
    }

    function toggleSettings() {
        document.getElementById('set-panel').classList.toggle('open');
    }

    async function loadContent(cat) {
        const vp = document.getElementById('viewport');
        vp.innerHTML = '<div style="padding:100px; text-align:center;">Vibrations violettes en cours...</div>';
        ytPlayers = {}; 

        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,id&chart=mostPopular&maxResults=15&regionCode=FR&videoCategoryId=${cat}&key=${API_KEY}`);
            const data = await res.json();
            vp.innerHTML = '';

            data.items.forEach((item, i) => {
                const slide = document.createElement('div');
                slide.className = `slide ${currentMode === 'shorts' ? 'vertical' : ''}`;
                const pId = 'player-' + i;
                
                slide.innerHTML = `
                    <div class="v-card"><div id="${pId}"></div></div>
                    <div class="v-info">@${item.snippet.channelTitle}</div>
                `;
                vp.appendChild(slide);

                new YT.Player(pId, {
                    videoId: item.id,
                    playerVars: { autoplay: 0, mute: 1, rel: 0, modestbranding: 1 },
                    events: { 
                        'onReady': (e) => { ytPlayers[pId] = e.target; },
                        'onStateChange': (e) => { if(e.data === 0 && document.getElementById('set-autoscroll').checked) scrollMove(1); }
                    }
                });
            });
            startObservation();
        } catch (e) { console.error(e); }
    }

    function startObservation() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.querySelector('.v-card > div').id;
                const p = ytPlayers[id];
                if (!p) return;

                if (entry.isIntersecting) {
                    p.playVideo();
                    if(document.getElementById('set-sound').checked) p.unMute();
                } else {
                    p.pauseVideo();
                    p.mute();
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.slide').forEach(s => observer.observe(s));
    }

    function changeMode(m) {
        currentMode = m;
        document.getElementById('b-gaming').classList.toggle('active', m === 'gaming');
        document.getElementById('b-shorts').classList.toggle('active', m === 'shorts');
        loadContent(m === 'gaming' ? 20 : 24);
    }

    function scrollMove(d) {
        document.getElementById('viewport').scrollBy(0, window.innerHeight * d);
    }

    window.onload = () => {
        document.getElementById('set-sound').checked = localStorage.getItem('buzz-sound') === 'true';
        document.getElementById('set-autoscroll').checked = localStorage.getItem('buzz-auto') === 'true';
        loadContent(20);
    };
</script>
</body>
</html>
