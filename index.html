<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzDash - Overlay Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9d00ff; --bg: #000000; --side: #080808; --nav-h: 70px; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; }
        
        /* Barre Latérale */
        .sidebar { width: 220px; height: 100vh; background: var(--side); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding-top: 80px; box-sizing: border-box; }
        .side-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 15px; color: #888; transition: 0.2s; }
        .side-item:hover, .side-item.active { background: #111; color: white; }
        .side-item.active { border-left: 4px solid var(--accent); color: var(--accent); }

        /* Contenu Principal */
        .main-content { flex: 1; height: 100vh; position: relative; }
        
        /* Nav centrée */
        .nav { height: var(--nav-h); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); position: fixed; top: 0; left: 220px; right: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
        .logo-abs { position: absolute; left: 30px; font-weight: 900; color: var(--accent); font-size: 26px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 15px var(--accent); }
        .btn-group { display: flex; gap: 5px; background: #080808; padding: 5px; border-radius: 30px; border: 1px solid #1a1a1a; }
        .btn { background: transparent; border: none; color: #666; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .btn.active { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent); }

        /* Viewport ultra-fluide */
        #viewport { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        #viewport::-webkit-scrollbar { display: none; }

        .slide { height: 100vh; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; position: relative; padding-top: calc(var(--nav-h) + 10px); box-sizing: border-box; }
        
        /* Conteneur Immersif */
        .v-container { width: 90%; max-width: 950px; aspect-ratio: 16/9; position: relative; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .vertical .v-container { max-width: 420px; height: 88vh; aspect-ratio: unset; } 
        
        iframe { width: 100%; height: 100%; border: none; }

        /* ZONE D'OVERLAY (Pseudo + Titre) */
        .v-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); padding: 20px; box-sizing: border-box; }
        .v-overlay .pseudo { font-weight: 900; font-size: 18px; color: var(--accent); text-shadow: 0 0 10px rgba(157,0,255,0.5); display: inline; }
        .v-overlay .title { font-weight: 700; font-size: 16px; color: white; display: inline; margin-left: 10px; opacity: 0.9; }

        /* Flèches de navigation */
        .nav-arrows { position: fixed; right: 30px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .arrow { background: rgba(255,255,255,0.05); border: 1px solid #222; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: 0.3s; }
        .arrow:hover { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-item active">🏠 Accueil</div>
    </div>

    <div class="main-content">
        <div class="nav">
            <div class="logo-abs">BUZZDASH</div>
            <div class="btn-group">
                <button id="b-gaming" class="btn active" onclick="changeMode('gaming')">Gaming</button>
                <button id="b-shorts" class="btn" onclick="changeMode('shorts')">Shorts</button>
            </div>
        </div>

        <div class="nav-arrows">
            <button class="arrow" onclick="scrollBy(0, -window.innerHeight)">↑</button>
            <button class="arrow" onclick="scrollBy(0, window.innerHeight)">↓</button>
        </div>

        <div id="viewport"></div>
    </div>

<script>
    // METS BIEN TA CLÉ CI-DESSOUS
    const API_KEY = 'AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs'; 
    let currentMode = 'gaming';

    async function loadContent(catId) {
        const container = document.getElementById('viewport');
        container.innerHTML = '<p style="text-align:center; padding-top:100px;">Chargement du flux immersif...</p>';
        
        try {
            const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,id&chart=mostPopular&maxResults=15&regionCode=FR&videoCategoryId=${catId}&key=${API_KEY}`);
            const d = await r.json();
            container.innerHTML = '';
            
            d.items.forEach(v => {
                // Filtre Shorts : on zappe les vidéos horizontales
                if(currentMode === 'shorts' && v.contentDetails.definition === 'hd' && !v.snippet.title.toLowerCase().includes('short')) return;

                const s = document.createElement('div');
                s.className = `slide ${currentMode === 'shorts' ? 'vertical' : ''}`;
                s.innerHTML = `
                    <div class="v-container">
                        <iframe class="yt-player" src="https://www.youtube.com/embed/${v.id}?enablejsapi=1&autoplay=0&mute=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media"></iframe>
                        <div class="v-overlay">
                            <span class="pseudo">@${v.snippet.channelTitle}</span>
                            <span class="title">${v.snippet.title}</span>
                        </div>
                    </div>`;
                container.appendChild(s);
            });
            startObserving();
        } catch (e) { alert("Erreur API YouTube."); }
    }

    // Gestion du Son Simplifiée
    function startObserving() {
        setTimeout(() => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const iframe = entry.target.querySelector('iframe');
                    if (entry.isIntersecting) {
                        iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                    } else {
                        iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                        iframe.contentWindow.postMessage('{"event":"command","func":"mute","args":""}', '*');
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.slide').forEach(s => observer.observe(s));
        }, 1000);
    }

    function changeMode(mode) {
        currentMode = mode;
        document.getElementById('b-gaming').classList.toggle('active', mode === 'gaming');
        document.getElementById('b-shorts').classList.toggle('active', mode === 'shorts');
        loadContent(mode === 'gaming' ? 20 : 24);
    }

    loadContent(20);
</script>
</body>
</html>
