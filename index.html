<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPCORN STREAM | Cinéma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #050505; --txt: #ffffff; --acc: #facc15; --side: #0d0d0d; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* INTRO STUDIO (Oeil centré) */
        #intro { position: fixed; inset: 0; z-index: 9999; background: black; display: flex; justify-content: center; align-items: center; animation: fadeOut 0.8s forwards 4s; }
        .m-box { position: relative; display: flex; align-items: center; gap: 25px; }
        .m-pop { font-size: 110px; filter: drop-shadow(0 0 20px var(--acc)); position: relative; }
        .m-eye { position: absolute; font-size: 48px; top: 55%; left: 50%; transform: translate(-50%, -50%); opacity: 0; animation: eyeIn 0.5s forwards 1.8s, blink 0.3s infinite 3s; }
        .m-name { font-family: 'Syncopate'; font-size: 45px; color: var(--acc); text-transform: uppercase; opacity: 0; animation: txtIn 1s forwards 2.2s; line-height: 1; }
        
        @keyframes eyeIn { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes blink { 0%, 90%, 100% { transform: translate(-50%, -50%) scaleY(1); } 95% { transform: translate(-50%, -50%) scaleY(0); } }
        @keyframes txtIn { to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* UI */
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--side); border-right: 1px solid rgba(255,255,255,0.05); padding: 30px; z-index: 100; }
        .topbar { position: fixed; top: 0; left: 260px; right: 0; height: 80px; background: var(--bg); display: flex; align-items: center; padding: 0 40px; z-index: 50; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .content { margin-left: 260px; padding: 110px 40px 40px; }

        .card { background: rgba(255,255,255,0.03); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .card:hover { border-color: var(--acc); transform: translateY(-5px); background: rgba(255,255,255,0.08); }

        #modal { position: fixed; inset: 0; background: black; z-index: 2000; display: none; justify-content: center; align-items: center; }
        #modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="m-box">
            <div class="m-pop">🍿<div class="m-eye">👁️</div></div>
            <div class="m-name">Popcorn<br><span style="color:white">Stream</span></div>
        </div>
    </div>

    <aside class="sidebar">
        <h1 class="text-xl font-black text-yellow-500 italic mb-10">POPCORN STREAM</h1>
        <nav class="space-y-2 font-bold text-gray-400">
            <button onclick="load('films complets français')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🔥 À LA UNE</button>
            <button onclick="load('film action complet')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🎬 ACTION</button>
            <button onclick="load('documentaire complet')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🌍 DOCUMENTAIRES</button>
            <button onclick="load('bande annonce cinema')" class="w-full text-left p-3 rounded-lg hover:bg-yellow-500 hover:text-black transition">🎞️ TRAILERS</button>
            
            <div class="pt-10">
                <div class="text-[10px] opacity-40 mb-2">PAYS</div>
                <select id="lang" onchange="refresh()" class="w-full bg-white/5 border border-white/10 rounded p-2 text-xs">
                    <option value="fr">FRANCE 🇫🇷</option>
                    <option value="en">USA 🇺🇸</option>
                </select>
            </div>
        </nav>
    </aside>

    <header class="topbar">
        <div class="w-full max-w-xl relative">
            <input type="text" id="search" placeholder="Rechercher (ex: Kaizen, Batman...)" class="w-full bg-white/5 border border-white/10 rounded-xl px-12 py-3 outline-none focus:border-yellow-500 transition">
            <span class="absolute left-4 top-3.5 opacity-40">🔍</span>
        </div>
    </header>

    <main class="content">
        <h2 id="title" class="text-3xl font-black mb-8 italic uppercase tracking-tighter">PROJECTEURS PRÊTS...</h2>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="modal">
        <button onclick="closeP()" class="absolute top-8 right-8 bg-white text-black px-4 py-2 rounded-full font-bold">× FERMER</button>
        <div class="w-[90%] max-w-5xl aspect-video bg-black">
            <iframe id="player" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const KEY = "AIzaSyDXc2iuxIR4TXYr53Co43RHVii2Tc7FLgs";
        
        async function load(q) {
            const grid = document.getElementById('grid');
            const lang = document.getElementById('lang').value;
            document.getElementById('title').innerText = q.toUpperCase();
            grid.innerHTML = "<div class='col-span-full text-center py-20 animate-pulse'>Chargement de la pellicule...</div>";

            let finalQ = q;
            let duration = "long";

            if(q.toLowerCase().includes('kaizen') || q.toLowerCase().includes('annonce') || q.toLowerCase().includes('trailer')) {
                duration = "any";
            }

            // On force un peu plus la recherche
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&q=${encodeURIComponent(finalQ)}&type=video&videoDuration=${duration}&key=${KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.items && data.items.length > 0) {
                    grid.innerHTML = "";
                    data.items.forEach(item => {
                        grid.innerHTML += `
                            <div class="card" onclick="openP('${item.id.videoId}')">
                                <img src="${item.snippet.thumbnails.high.url}" class="w-full aspect-video object-cover">
                                <div class="p-4">
                                    <h3 class="font-bold text-sm line-clamp-2">${item.snippet.title}</h3>
                                    <p class="text-[10px] text-yellow-500 mt-2 font-bold uppercase">${item.snippet.channelTitle}</p>
                                </div>
                            </div>`;
                    });
                } else {
                    grid.innerHTML = "<div class='col-span-full text-center'>Rien trouvé. Essaie un mot plus simple !</div>";
                }
            } catch (e) {
                grid.innerHTML = "<div class='col-span-full text-center text-red-500'>Erreur de connexion API.</div>";
            }
        }

        function refresh() { load(document.getElementById('title').innerText.toLowerCase()); }
        function openP(id) { document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`; document.getElementById('modal').classList.add('active'); }
        function closeP() { document.getElementById('player').src = ""; document.getElementById('modal').classList.remove('active'); }
        
        document.getElementById('search').addEventListener('keypress', (e) => { if(e.key === 'Enter') load(e.target.value); });

        // Départ différé pour laisser l'intro briller
        setTimeout(() => load('films complets français'), 4500);
    </script>
</body>
</html>
